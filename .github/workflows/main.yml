name: Generate Datas

on:
  schedule: # executa a cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do Repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Snake Animation - GERA APENAS O GIF (Mais estável)
      - name: Generate Snake GIF
        uses: Platane/snk/gif-only@v3
        id: snake-gif
        with:
          github_user_name: Wegnernando94
          # Força a geração do GIF com a paleta GitHub (para ter o calendário de fundo)
          outputs: |
            dist/github-contribution-grid-snake.gif?palette=github

      # 3. Envia o GIF para o branch 'output' (referenciado no README)
      - name: Push snake GIF to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: Update snake animation"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:output
