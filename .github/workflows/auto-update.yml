name: Auto Update Profile
on:
  schedule:
    - cron: '0 0 * * *'  # Diário à meia-noite UTC
  workflow_dispatch:  # Para rodar manual
permissions:
  contents: write  # Permite push
jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Update profile
        run: |
          # Rode o Python se existir
          if [ -f "update_profile.py" ]; then
            python update_profile.py
          fi
          
          # Git setup
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add e commit só se mudou
          git add README.md
          if git diff --staged --quiet; then
            echo "Sem mudanças — pulando commit."
          else
            git commit -m "🔄 Auto-update profile with latest info"
            git push
          fi
