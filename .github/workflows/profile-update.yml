name: Update Profile

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update profile README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "# Profile updated on $(date -u '+%d/%m/%Y %H:%M UTC')" > .stats-last-updated
          git add .stats-last-updated
          git commit -m "🔄 Update profile - $(date -u '+%d/%m/%Y %H:%M UTC')" || exit 0
          git push
