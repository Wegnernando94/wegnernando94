name: Update Stats

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger stats refresh
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "# Stats refresh triggered on $(date '+%d/%m/%Y %H:%M UTC')" > .stats-last-updated
          git add .stats-last-updated
          git commit -m "📊 Refresh GitHub stats cache" || exit 0
          git push
