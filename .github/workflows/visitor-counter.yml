name: Visitor Counter

on:
  schedule:
    - cron: '0 * * * *'  # toda hora
  workflow_dispatch:

jobs:
  update-visitors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Atualiza contagem de visitas
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python update_visitors.py

      - name: Commit e push se houve mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md visitor-stats.json
          git diff --staged --quiet || git commit -m "chore: atualiza contador de visitas [skip ci]"
          git push
